{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Upload Excel</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl w-[500px]">

<h1 class="text-2xl font-bold text-center mb-6">

Upload Excel + Search Student

</h1>

<form method="POST"
enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-4">

<label class="font-bold">
Excel File
</label>

{{ form.excel_file }}

</div>

<div class="mb-4">

<label class="font-bold">
Student Roll
</label>

<input
type="number"
name="roll"
class="w-full border p-2 rounded"
placeholder="Enter Roll">

</div>
{% if error %}

<p class="text-red-500 mb-3">

{{ error }}

</p>

{% endif %}

<button
class="w-full bg-blue-700 text-white p-3 rounded">

Generate Report Card

</button>

</form>

</div>

</body>
</html>
